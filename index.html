<!DOCTYPE html>
<html>
<head>
  <title>Teacher Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      text-align: center;
      padding: 20px;
      color: #333;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 400px;
      margin: auto;
    }

    h2 {
      background: #2c3e50;
      color: white;
      padding: 12px;
      border-radius: 8px;
      font-size: 18px;
    }

    select, button {
      padding: 12px;
      margin: 10px;
      width: 90%;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    select {
      border: 1px solid #ccc;
    }

    button {
      background: green;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: darkgreen;
    }

    .stats {
      margin-top: 15px;
      display: flex;
      justify-content: space-around;
    }

    .box {
      padding: 10px;
      border-radius: 10px;
      width: 40%;
      color: white;
      font-weight: bold;
    }

    .present {
      background: #27ae60;
    }

    .absent {
      background: #e74c3c;
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
      color: green;
    }

  </style>
</head>

<body>

<div class="card">

<h2>🏫 Virtuous International K-12<br>Teacher Attendance</h2>

<select id="name">
  <option value="">Select Teacher</option>
  <option>Abhishek Sir</option>
  <option>Rakhi Maam</option>
  <option>Iqwal Sir</option>
  <option>Aashish Raj</option>
  <option>Amit</option>
  <option>Masum</option>
  <option>Aaradhya</option>
  <option>Kiran</option>
  <option>Akansha</option>
  <option>Archana</option>
</select>

<button onclick="markAttendance()">📍 Mark Attendance</button>

<div class="stats">
  <div class="box present">Present: <span id="presentCount">0</span></div>
  <div class="box absent">Absent: <span id="absentCount">10</span></div>
</div>

<p id="msg"></p>

</div>

<script>

let totalTeachers = 10;
let presentList = [];

function updateCounts() {
  document.getElementById("presentCount").innerText = presentList.length;
  document.getElementById("absentCount").innerText = totalTeachers - presentList.length;
}

function markAttendance() {

  let name = document.getElementById("name").value;

  if(name == "") {
    alert("Select Teacher Name");
    return;
  }

  // duplicate check
  if(presentList.includes(name)) {
    alert("Already Marked ✅");
    return;
  }

  let now = new Date();
  let date = now.toLocaleDateString();
  let time = now.toLocaleTimeString();

  navigator.geolocation.getCurrentPosition(function(pos) {

    let data = {
      name: name,
      date: date,
      time: time,
      lat: pos.coords.latitude,
      lon: pos.coords.longitude
    };

    fetch("https://script.google.com/macros/s/AKfycbyA9o8t90d51bZEee3--CTvhwI7GnAktEPjoUzYD15VXTg-713_C-W1_ecZHZ5gi7oB/exec", {
      method: "POST",
      body: JSON.stringify(data)
    })
    .then(() => {

      presentList.push(name);
      updateCounts();

      document.getElementById("msg").innerHTML =
        "✅ Attendance Saved Successfully";

    });

  }, function() {
    alert("Allow location 📍");
  });

}

</script>

</body>
</html>
